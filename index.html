<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shawarma | شاورما دريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* بانر عرض السعادة */
        .happy-banner {
            background: linear-gradient(90deg, #f97316, #ea580c, #f97316);
            background-size: 200% auto;
            animation: gradientMove 3s linear infinite;
            color: black; font-weight: 900; text-align: center; padding: 10px; font-size: 13px; z-index: 70;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* الواجهة الترحيبية */
        .hero {
            height: 90vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(10,10,10,1)), 
                        url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=1200');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* المنيو الأفقي */
        .horizontal-scroll {
            display: flex; overflow-x: auto; gap: 15px; padding: 20px 5px;
            scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .food-card {
            flex: 0 0 180px; scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.03); border-radius: 2rem; padding: 15px;
            border: 1px solid rgba(255,255,255,0.08); transition: 0.3s;
        }
        .food-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 1.5rem; margin-bottom: 12px; }

        .btn-add { background: #f97316; color: black; font-weight: 900; width: 100%; border-radius: 1rem; padding: 10px; font-size: 12px; }

        .cart-footer {
            fixed: bottom-0; w-full; background: rgba(15,15,15,0.95); backdrop-blur: 30px;
            border-t: 1px solid rgba(255,255,255,0.1); border-radius: 3rem 3rem 0 0;
            padding: 25px; z-index: 100;
        }

        .tab-active { background: #f97316 !important; color: black !important; font-weight: 900; }
        .branch-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="top-happy-banner" class="hidden happy-banner">
        🔥 <span id="banner-text">عرض السعادة مفعّل الآن! خصم 2 ريال على الأصناف</span>
    </div>

    <nav class="fixed top-12 w-full z-50 p-6 flex justify-between items-center transition-all" id="navbar">
        <button class="w-11 h-11 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10">
            <i class="fas fa-bars"></i>
        </button>
        <div class="text-center">
            <span class="text-xl font-black text-white italic tracking-tighter text-orange-500">DREAM</span>
        </div>
        <div class="flex gap-3">
            <button class="w-11 h-11 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10">
                <i class="fas fa-globe"></i>
            </button>
            <button class="w-11 h-11 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 relative">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </nav>

    <header class="hero">
        <div class="animate__animated animate__fadeInUp">
            <h2 class="text-orange-500 font-bold tracking-[5px] text-xs mb-3">PREMIUM QUALITY</h2>
            <h1 class="text-6xl font-black mb-8 leading-tight">Taste the<br><span class="text-orange-500 italic">Dream</span></h1>
            <a href="#menu-root" class="bg-orange-600 text-white px-10 py-5 rounded-full font-black text-lg shadow-2xl">ابدأ الطلب الآن</a>
        </div>
    </header>

    <div id="menu-root" class="max-w-xl mx-auto px-4 pt-10 pb-48">
        <h3 class="text-xs font-bold text-gray-500 mb-4 tracking-widest uppercase">اختر الفرع</h3>
        <div class="flex overflow-x-auto gap-3 mb-10 no-scrollbar">
            <button onclick="setBranch('شارع 32', this)" class="branch-btn tab-active flex-shrink-0 bg-white/5 px-8 py-4 rounded-3xl text-sm font-bold">فرع شارع 32</button>
            <button onclick="setBranch('حدا', this)" class="branch-btn flex-shrink-0 bg-white/5 px-8 py-4 rounded-3xl text-sm font-bold">فرع حدا</button>
            <button onclick="setBranch('خط العين', this)" class="branch-btn flex-shrink-0 bg-white/5 px-8 py-4 rounded-3xl text-sm font-bold">فرع خط العين</button>
            <button onclick="setBranch('المجاهدين', this)" class="branch-btn flex-shrink-0 bg-white/5 px-8 py-4 rounded-3xl text-sm font-bold">فرع المجاهدين</button>
        </div>

        <div id="main-menu-container"></div>
    </div>

    <div id="cart-footer" class="cart-footer fixed bottom-0 left-0 w-full hidden animate__animated animate__slideInUp">
        <div class="flex justify-between items-center mb-6">
            <h4 class="text-xl font-black">طلباتك 🛒</h4>
            <span id="total-price" class="text-2xl font-black text-orange-500">0 ريال</span>
        </div>
        <div id="cart-items" class="max-h-32 overflow-y-auto mb-6 space-y-3"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-5 rounded-2xl flex justify-center items-center gap-3 shadow-xl">
            <i class="fab fa-whatsapp text-2xl"></i> إتمام الطلب عبر واتساب
        </button>
    </div>

    <script>
        const branches = { 'شارع 32': '966546656090', 'حدا': '966560883385', 'خط العين': '966549113072', 'المجاهدين': '966550147396' };
        let activeBranch = 'شارع 32';
        let cart = [];

        const menuData = {
            "🌯 قسم الشاورما": [
                {n:"شاورما دجاج صغير", p:6, cat:"food", img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما دجاج كبير", p:8, cat:"food", img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما جبنة", p:7, cat:"food", img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}
            ],
            "🥤 المشروبات": [
                {n:"بيبسي", p:2.5, cat:"drink", img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300"},
                {n:"ماء", p:1, cat:"drink", img:"https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=300"}
            ]
        };

        function isHappyNow() {
            const now = new Date();
            return (now.getDay() === 0 || now.getDay() === 1) && (now.getHours() >= 16 && now.getHours() < 19);
        }

        function setBranch(name, btn) {
            activeBranch = name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function render() {
            const happy = isHappyNow();
            const banner = document.getElementById('top-happy-banner');
            if(happy) banner.classList.remove('hidden');

            const container = document.getElementById('main-menu-container');
            container.innerHTML = '';
            for (const [cat, items] of Object.entries(menuData)) {
                let s = `<div class="mb-10"><h2 class="text-xl font-black mb-4 flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-500 rounded-full"></span>${cat}</h2><div class="horizontal-scroll">`;
                items.forEach(item => {
                    const price = (happy && item.cat === 'food') ? item.p - 2 : item.p;
                    s += `<div class="food-card">
                        <img src="${item.img}">
                        <h4 class="text-xs font-bold mb-1 h-8 overflow-hidden">${item.n}</h4>
                        <p class="text-orange-500 font-black text-sm mb-4">${price} ريال</p>
                        <button onclick="add('${item.n}', ${price})" class="btn-add">أضف للطلب</button>
                    </div>`;
                });
                container.innerHTML += s + `</div></div>`;
            }
        }

        function add(n, p) { cart.push({n, p, id: Date.now()}); updateUI(); }

        function updateUI() {
            const f = document.getElementById('cart-footer');
            const badge = document.getElementById('cart-count');
            f.classList.toggle('hidden', cart.length === 0);
            badge.classList.toggle('hidden', cart.length === 0);
            badge.innerText = cart.length;
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.p, 0) + ' ريال';
            
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = '';
            cart.forEach(i => {
                itemsDiv.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-2xl text-[10px]">
                    <span>${i.n}</span>
                    <button onclick="remove(${i.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>`;
            });
        }

        function remove(id) { cart = cart.filter(i => i.id !== id); updateUI(); }

        function checkout() {
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            const total = cart.reduce((s, i) => s + i.p, 0);
            const summary = {};
            cart.forEach(i => summary[i.n] = (summary[i.n] || 0) + 1);
            
            let itemsText = "";
            for (const [name, qty] of Object.entries(summary)) itemsText += `• ${qty}x ${name}\n`;

            let msg = `📦 *طلب جديد - شاورما دريم*\n--------------------------\n📍 *الفرع:* ${activeBranch}\n🕒 *الوقت:* ${time}\n🍱 *النوع:* سفري\n\n📝 *الطلبات:*\n${itemsText}\n--------------------------\n💰 *الإجمالي: ${total} ريال*`;
            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
