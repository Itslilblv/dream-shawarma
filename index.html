<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - المنيو الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; }
        .happy-hour-bg { background: linear-gradient(90deg, #f97316, #ea580c); }
        .section-card { background: #121212; border-radius: 1.5rem; padding: 1.2rem; border: 1px solid #1f1f1f; }
        .tab-active { background-color: #f97316 !important; color: black !important; }
    </style>
</head>
<body class="pb-32">

    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md z-50 border-b border-white/5 p-4 flex justify-between items-center">
        <h1 class="text-xl font-black text-orange-500 italic">DREAM SHAWARMA</h1>
        <div id="branch-tag" class="bg-orange-500 text-black px-3 py-1 rounded-full text-[10px] font-black">فرع شارع 32</div>
    </nav>

    <div id="happy-banner" class="hidden mt-16 happy-hour-bg text-black py-2 text-center font-black text-xs">
        🎁 عرض السعادة مفعّل (الأحد والاثنين)! خصم 2 ريال على الوجبات 🔥
    </div>

    <div class="pt-24 px-4 flex flex-wrap justify-center gap-2 mb-6">
        <button onclick="setBranch('شارع 32', '966549113072', this)" class="branch-btn tab-active bg-white/5 px-4 py-2 rounded-xl text-[10px]">شارع 32</button>
        <button onclick="setBranch('حدا', '966546656090', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-[10px]">حدا</button>
        <button onclick="setBranch('خط العين', '966549113072', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-[10px]">خط العين</button>
        <button onclick="setBranch('المجاهدين', '966549113072', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-[10px]">المجاهدين</button>
    </div>

    <main id="menu-root" class="max-w-xl mx-auto px-4 space-y-6"></main>

    <div id="cart-footer" class="fixed bottom-0 w-full bg-[#121212] border-t border-white/10 p-4 z-50 hidden">
        <div id="cart-items" class="max-h-32 overflow-y-auto mb-3 space-y-2"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-3 rounded-2xl flex justify-between px-6 items-center">
            <span>إرسال الطلب للواتساب</span>
            <span id="total-price">0 ريال</span>
        </button>
    </div>

    <script>
        const branches = { 'شارع 32': '966549113072', 'حدا': '966546656090', 'خط العين': '966549113072', 'المجاهدين': '966549113072' };
        let activeBranch = 'شارع 32';
        let cart = [];

        const menuData = {
            "🌯 الشاورما": [
                {n:"شاورما دجاج صغير", p:6}, {n:"شاورما دجاج كبير", p:8}, {n:"صحن عربي كبير", p:19}, {n:"صحن عربي وسط", p:16}, {n:"صحن بطاطس كبير", p:15}
            ],
            "🍱 الوجبات": [
                {n:"وجبة برجر دجاج", p:15}, {n:"وجبة برجر لحم", p:15}, {n:"وجبة دبل برجر", p:20}, {n:"وجبة دبل بالجبنة", p:21}, {n:"باشكة ايطاليا", p:20}
            ],
            "🍔 الساندوتشات": [
                {n:"برجر دجاج", p:8}, {n:"برجر لحم", p:8}, {n:"برجر زنجر", p:8}, {n:"تورتيلا", p:9}, {n:"برجر جمبري", p:8}
            ],
            "🥤 المشروبات": [
                {n:"بيبسي", p:2.5, noD: true}, {n:"ماء", p:1, noD: true}, {n:"عصير مصاص", p:2, noD: true}
            ]
        };

        function isHappyDay() {
            const d = new Date();
            const day = d.getDay(); // 0=Sunday, 1=Monday
            const hour = d.getHours();
            return (day === 0 || day === 1) && (hour >= 17 && hour < 19);
        }

        function setBranch(name, phone, btn) {
            activeBranch = name;
            document.getElementById('branch-tag').innerText = 'فرع ' + name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function renderMenu() {
            const root = document.getElementById('menu-root');
            const happy = isHappyDay();
            if(happy) document.getElementById('happy-banner').classList.remove('hidden');

            for (const [cat, items] of Object.entries(menuData)) {
                let section = `<div class="section-card"><h3 class="text-orange-500 font-black mb-4">${cat}</h3><div class="space-y-3">`;
                items.forEach(item => {
                    const price = (happy && !item.noD) ? item.p - 2 : item.p;
                    section += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5 text-sm">
                        <span>${item.n}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-orange-500 font-black">${price} ريال</span>
                            <button onclick="addToCart('${item.n}', ${price})" class="bg-orange-500 text-black px-3 py-1 rounded-lg font-black text-xs">أضف</button>
                        </div>
                    </div>`;
                });
                root.innerHTML += section + `</div></div>`;
            }
        }

        function addToCart(name, price) {
            cart.push({ name, price, id: Date.now() });
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const footer = document.getElementById('cart-footer');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            
            if(cart.length > 0) footer.classList.remove('hidden');
            else footer.classList.add('hidden');

            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                itemsDiv.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-[10px]">
                    <span>${item.name}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-orange-500">${item.price} ريال</span>
                        <button onclick="removeFromCart(${item.id})" class="text-red-500 font-black px-2">X</button>
                    </div>
                </div>`;
            });
            totalSpan.innerText = total + ' ريال';
        }

        function checkout() {
            let orderText = `طلب جديد من الموقع 👋%0Aالفرع: *${activeBranch}*%0A%0A`;
            cart.forEach(i => orderText += `• ${i.name} (${i.price} ريال)%0A`);
            const total = cart.reduce((s, i) => s + i.price, 0);
            orderText += `%0A*الإجمالي: ${total} ريال*`;
            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(orderText)}`, '_blank');
        }

        renderMenu();
    </script>
</body>
</html>
