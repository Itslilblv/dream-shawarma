<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shawarma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }
        
        /* الواجهة الكبيرة بناءً على الصورة */
        .hero {
            height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #0a0a0a), 
                        url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=800');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            position: relative;
        }

        .hero-title { font-size: 3rem; font-weight: 900; line-height: 1; }
        .hero-subtitle { letter-spacing: 4px; font-size: 0.7rem; color: #f97316; font-weight: bold; margin-bottom: 0.5rem; }

        .btn-order { background: #d35400; color: white; padding: 12px 40px; border-radius: 2rem; font-weight: 900; font-size: 1.2rem; margin-top: 2rem; }

        /* أزرار الفروع */
        .branch-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 20px; scrollbar-width: none; }
        .branch-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 1rem; white-space: nowrap; font-size: 14px; }
        .branch-active { background: #f97316; color: black; font-weight: bold; }

        /* المنيو الأفقي */
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .food-card { flex: 0 0 170px; background: rgba(255, 255, 255, 0.04); border-radius: 1.5rem; padding: 12px; border: 1px solid rgba(255,255,255,0.08); }
        .food-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 1rem; }

        #sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #0f0f0f; z-index: 300; transition: 0.4s; padding: 40px 20px; border-left: 1px solid #222; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 250; display: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-10">
            <span class="font-black text-orange-500 italic">DREAM</span>
            <button onclick="toggleSidebar()"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="space-y-6">
            <button onclick="showModal('customer-tab')" class="w-full text-right font-bold flex justify-between items-center">
                <span>أرسل اقتراحك</span><i class="fas fa-pen-nib text-orange-500 text-sm"></i>
            </button>
            <hr class="border-white/5">
            <button onclick="checkAdmin()" class="w-full text-right font-bold flex justify-between items-center opacity-30">
                <span>الإدارة</span><span>🔒</span>
            </button>
        </div>
    </div>

    <section class="hero">
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center">
            <button class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md"><i class="fas fa-shopping-bag"></i></button>
            <div class="font-black italic tracking-widest">DREAM SHAWARMA</div>
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md"><i class="fas fa-bars"></i></button>
        </nav>

        <div>
            <p class="hero-subtitle">PREMIUM QUALITY</p>
            <h1 class="hero-title">Taste the <br><span class="text-orange-500 italic">Dream</span></h1>
            <button onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})" class="btn-order">اطلب الآن</button>
        </div>
    </section>

    <div class="branch-scroll">
        <button class="branch-btn branch-active">فرع شارع 32</button>
        <button class="branch-btn">فرع حدا</button>
        <button class="branch-btn">فرع خط العين</button>
    </div>

    <main id="menu" class="px-5 pb-40">
        <div id="menu-content"></div>
    </main>

    <script>
        const menuData = {
            "🌯 قسم الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما دجاج كبير", p:8, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي كبير", p:19, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}
            ],
            "🍔 قسم البرجر": [
                {n:"برجر دجاج", p:10, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر دجاج بالجبنة", p:12, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"}
            ],
            "🍕 قسم الباشكا": [
                {n:"باشكا صغير", p:13, img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"},
                {n:"باشكا كبير", p:18, img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"}
            ],
            "🥤 المشروبات": [
                {n:"بيبسي", p:2.5, img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300"},
                {n:"ماء", p:1, img:"https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=300"}
            ]
        };

        function render() {
            const root = document.getElementById('menu-content');
            for (const [cat, items] of Object.entries(menuData)) {
                let html = `<div class="mt-8"><h2 class="text-lg font-black mb-2 border-r-4 border-orange-500 pr-2">${cat}</h2><div class="horizontal-scroll">`;
                items.forEach(item => {
                    html += `<div class="food-card">
                        <img src="${item.img}">
                        <h4 class="text-xs font-bold mt-2 h-8">${item.n}</h4>
                        <p class="text-orange-500 font-black text-sm my-1">${item.p} ريال</p>
                        <button class="w-full bg-orange-600 text-black font-black py-2 rounded-xl text-[10px]">أضف للطلب</button>
                    </div>`;
                });
                root.innerHTML += html + `</div></div>`;
            }
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            const isOpen = s.style.right === '0px';
            s.style.right = isOpen ? '-280px' : '0px';
            o.style.display = isOpen ? 'none' : 'block';
        }

        render();
    </script>
</body>
</html>
