<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shawarma | شاورما دريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* الواجهة الرئيسية الكاملة (Hero) */
        .hero {
            height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #0a0a0a), 
                        url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=800');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            position: relative;
        }

        .hero-title { font-size: 3.2rem; font-weight: 900; line-height: 1; }
        .hero-subtitle { letter-spacing: 4px; font-size: 0.75rem; color: #f97316; font-weight: bold; margin-bottom: 0.5rem; }
        .btn-order { background: #d35400; color: white; padding: 14px 45px; border-radius: 2rem; font-weight: 900; font-size: 1.3rem; margin-top: 2rem; box-shadow: 0 10px 30px rgba(211, 84, 0, 0.4); }

        /* أزرار الفروع */
        .branch-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 20px; scrollbar-width: none; }
        .branch-scroll::-webkit-scrollbar { display: none; }
        .branch-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 1.2rem; white-space: nowrap; font-size: 14px; transition: 0.3s; }
        .branch-active { background: #f97316; color: black; font-weight: bold; border-color: #f97316; }

        /* نظام المنيو الأفقي */
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 5px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        
        .food-card { 
            flex: 0 0 165px; scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.04); border-radius: 1.8rem; padding: 12px; 
            border: 1px solid rgba(255,255,255,0.08); text-align: center;
        }
        .food-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 1.2rem; margin-bottom: 8px; }

        /* القائمة الجانبية والسلة */
        #sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #0f0f0f; z-index: 500; transition: 0.4s; padding: 40px 20px; border-left: 1px solid #222; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 400; display: none; backdrop-filter: blur(5px); }
        
        .cart-footer { 
            position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.96); 
            backdrop-filter: blur(15px); border-radius: 2.5rem 2.5rem 0 0; padding: 18px 24px; 
            z-index: 100; border-top: 1px solid rgba(255,255,255,0.1); 
        }
        .type-btn { background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 12px; font-size: 12px; border: 1px solid transparent; }
        .type-active { border-color: #f97316; color: #f97316; background: rgba(249, 115, 22, 0.1); }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-10">
            <span class="font-black text-orange-500 italic">DREAM MENU</span>
            <button onclick="toggleSidebar()"><i class="fas fa-times text-xl text-white/50"></i></button>
        </div>
        <div class="space-y-6">
            <button onclick="alert('خدمة الاقتراحات مفعلة')" class="w-full text-right font-bold flex justify-between items-center">
                <span>أرسل اقتراحك</span><i class="fas fa-pen-nib text-orange-500"></i>
            </button>
            <hr class="border-white/5">
            <button onclick="if(prompt('رمز الإدارة:')==='12340')alert('مرحباً محمد')" class="w-full text-right font-bold flex justify-between items-center opacity-30">
                <span>الإدارة</span><span>🔒</span>
            </button>
        </div>
    </div>

    <section class="hero">
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center z-10">
            <button class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10"><i class="fas fa-shopping-bag"></i></button>
            <div class="font-black italic tracking-widest text-lg">DREAM SHAWARMA</div>
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10"><i class="fas fa-bars"></i></button>
        </nav>

        <div>
            <p class="hero-subtitle">PREMIUM QUALITY</p>
            <h1 class="hero-title">Taste the <br><span class="text-orange-500 italic">Dream</span></h1>
            <button onclick="document.getElementById('menu-start').scrollIntoView({behavior:'smooth'})" class="btn-order">اطلب الآن</button>
        </div>
    </section>

    <div id="menu-start" class="branch-scroll">
        <button class="branch-btn branch-active">فرع شارع 32</button>
        <button class="branch-btn">فرع حدا</button>
        <button class="branch-btn">فرع خط العين</button>
    </div>

    <main id="menu-container" class="px-5 pb-48 pt-4"></main>

    <div id="cart-footer" class="cart-footer hidden">
        <div class="flex justify-between items-center mb-4">
            <div class="flex gap-2">
                <button id="btn-pickup" onclick="setOrderType('استلام')" class="type-btn type-active">استلام</button>
                <button id="btn-delivery" onclick="setOrderType('توصيل')" class="type-btn">توصيل</button>
            </div>
            <p id="total-price" class="text-xl font-black text-orange-500">0 ريال</p>
        </div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-center items-center gap-2">
            إتمام الطلب عبر واتساب <i class="fab fa-whatsapp text-lg"></i>
        </button>
    </div>

    <script>
        let cart = [];
        let orderType = 'استلام';

        // المنيو الكامل 100%
        const fullMenu = {
            "🌯 قسم الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما دجاج كبير", p:8, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما دجاج بالجبنة", p:7, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي صغير", p:13, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي كبير", p:19, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}
            ],
            "🍔 قسم البرجر": [
                {n:"برجر دجاج", p:10, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر دجاج بالجبنة", p:12, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"}
            ],
            "🍕 قسم الباشكا": [
                {n:"باشكا دجاج صغير", p:13, img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"},
                {n:"باشكا دجاج كبير", p:18, img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"}
            ],
            "🥤 المشروبات": [
                {n:"بيبسي", p:2.5, img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300"},
                {n:"كوكاكولا", p:2.5, img:"https://images.unsplash.com/photo-1554866585-cd94860890b7?w=300"},
                {n:"ماء", p:1, img:"https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=300"}
            ]
        };

        function render() {
            const container = document.getElementById('menu-container');
            for (const [section, items] of Object.entries(fullMenu)) {
                let sectionHtml = `<div class="mb-10"><h2 class="text-lg font-black mb-3 border-r-4 border-orange-500 pr-2">${section}</h2><div class="horizontal-scroll">`;
                items.forEach(item => {
                    sectionHtml += `<div class="food-card">
                        <img src="${item.img}">
                        <h4 class="text-[11px] font-bold mt-1 h-6">${item.n}</h4>
                        <p class="text-orange-500 font-black text-sm my-2">${item.p} ريال</p>
                        <button onclick="addToCart('${item.n}', ${item.p})" class="w-full bg-orange-600 text-black font-black py-2 rounded-xl text-[10px]">أضف</button>
                    </div>`;
                });
                container.innerHTML += sectionHtml + `</div></div>`;
            }
        }

        function addToCart(n, p) { cart.push({n, p}); updateCartUI(); }
        function updateCartUI() {
            const footer = document.getElementById('cart-footer');
            footer.classList.toggle('hidden', cart.length === 0);
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.p, 0) + ' ريال';
        }

        function setOrderType(t) {
            orderType = t;
            document.getElementById('btn-pickup').classList.toggle('type-active', t === 'استلام');
            document.getElementById('btn-delivery').classList.toggle('type-active', t === 'توصيل');
        }

        function checkout() {
            const total = cart.reduce((s, i) => s + i.p, 0);
            const summary = {};
            cart.forEach(i => summary[i.n] = (summary[i.n] || 0) + 1);
            let text = `📦 *طلب جديد من الموقع*\n---\n🍱 *النوع:* ${orderType}\n${orderType === 'توصيل' ? '📍 *يرجى إرسال اللوكيشن*\n' : ''}\n📝 *الطلبات:*\n`;
            for (const [name, qty] of Object.entries(summary)) text += `• ${qty}x ${name}\n`;
            text += `---\n💰 *الإجمالي: ${total} ريال*`;
            window.open(`https://wa.me/966546656090?text=${encodeURIComponent(text)}`);
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            const open = s.style.right === '0px';
            s.style.right = open ? '-280px' : '0px';
            o.style.display = open ? 'none' : 'block';
        }

        render();
    </script>
</body>
</html>
