<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shawarma | شاورما دريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; margin: 0; scroll-behavior: smooth; }
        .hero { height: 100vh; background: linear-gradient(to bottom, rgba(0,0,0,0.4), #0a0a0a), url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=800'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .food-card { flex: 0 0 160px; background: #161616; border-radius: 1.5rem; padding: 10px; border: 1px solid #222; text-align: center; }
        .food-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 1rem; margin-bottom: 8px; }
        #sidebar { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #0f0f0f; z-index: 500; transition: 0.4s; padding: 30px 20px; border-left: 1px solid #333; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 400; display: none; backdrop-filter: blur(4px); }
        .cart-panel { position: fixed; bottom: 0; width: 100%; background: #111; border-radius: 2rem 2rem 0 0; padding: 20px; z-index: 100; border-top: 2px solid #f97316; display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-orange-500 font-black text-xl italic">SHAWARMA DREAM</h3>
            <button onclick="toggleSidebar()"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div class="space-y-6">
            <div class="p-4 bg-white/5 rounded-2xl border border-white/10 text-right">
                <p class="text-orange-500 font-bold mb-2"><i class="fas fa-pen-nib ml-2"></i>أرسل اقتراحك</p>
                <textarea id="sugg-text" placeholder="اكتب اقتراحك هنا..." class="w-full bg-transparent border-none outline-none text-sm h-24 resize-none"></textarea>
                <button onclick="sendSugg()" class="w-full bg-orange-600 text-black font-black py-2 rounded-xl mt-2 text-sm">إرسال</button>
            </div>
            <hr class="border-white/5">
            <button class="w-full text-right flex justify-between items-center opacity-40">
                <span>لوحة الاقتراحات (خاص)</span><i class="fas fa-lock text-xs"></i>
            </button>
        </div>
    </div>

    <section class="hero">
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center z-10">
            <button onclick="openCart()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10"><i class="fas fa-shopping-bag"></i></button>
            <div class="font-black italic text-xl">SHAWARMA DREAM</div>
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10"><i class="fas fa-bars"></i></button>
        </nav>
        <div>
            <h1 class="text-5xl font-black italic">Taste the <span class="text-orange-500">Dream</span></h1>
            <button onclick="document.getElementById('menu-start').scrollIntoView({behavior:'smooth'})" class="mt-8 bg-orange-600 px-10 py-4 rounded-full font-black text-xl">اطلب الآن</button>
        </div>
    </section>

    <div id="menu-start" class="flex overflow-x-auto gap-3 p-6 no-scrollbar">
        <button class="bg-orange-600 text-black px-6 py-2 rounded-full whitespace-nowrap font-bold">فرع شارع 32</button>
        <button class="bg-white/5 border border-white/10 px-6 py-2 rounded-full whitespace-nowrap font-bold">فرع حدا</button>
    </div>

    <main id="menu-container" class="px-5 pb-40">
        </main>

    <div id="cart-panel" class="cart-panel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-black text-xl">طلباتك 🛒</h3>
            <p id="total-price" class="text-orange-500 font-black text-2xl">0 ريال</p>
        </div>
        <div id="cart-items" class="max-h-32 overflow-y-auto mb-4 space-y-2"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-center items-center gap-2">إتمام الطلب عبر واتساب <i class="fab fa-whatsapp text-2xl"></i></button>
    </div>

    <script>
        let cart = [];
        // جميع الأصناف عادت كما كانت
        const menuData = {
            "🌯 قسم الشاورما": [
                {n:"شاورما دجاج صغير", p:6, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200"},
                {n:"شاورما دجاج كبير", p:8, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200"},
                {n:"شاورما صغير بالجبنة", p:7, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200"},
                {n:"صحن عربي صغير", p:12, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200"},
                {n:"صحن عربي كبير", p:19, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200"}
            ],
            "🍔 قسم البرجر": [
                {n:"برجر دجاج", p:10, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200"},
                {n:"برجر دجاج بالجبنة", p:12, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200"},
                {n:"وجبة برجر دجاج", p:15, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200"},
                {n:"وجبة برجر لحم", p:15, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200"}
            ],
            "🍟 قسم البطاطس": [
                {n:"بطاطس صغير", p:5, img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200"},
                {n:"بطاطس كبير", p:15, img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200"}
            ]
        };

        function render() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            // عرض الأقسام الأساسية
            for (const [title, items] of Object.entries(menuData)) {
                let html = `<div class="mb-8"><h2 class="text-lg font-black mb-3 border-r-4 border-orange-500 pr-2">${title}</h2><div class="horizontal-scroll">`;
                items.forEach(item => {
                    html += `<div class="food-card"><img src="${item.itemImg || item.img}"><h4 class="text-[11px] font-bold h-8">${item.n}</h4><p class="text-orange-500 font-black text-xs my-1">${item.p} ريال</p><button onclick="addToCart('${item.n}', ${item.p})" class="w-full bg-orange-600 text-black font-black py-1.5 rounded-xl text-[10px]">أضف</button></div>`;
                });
                container.innerHTML += html + `</div></div>`;
            }

            // قسم المشروبات المصغر والذكي
            let drinkHtml = `
            <div class="mb-10">
                <h2 class="text-lg font-black mb-3 border-r-4 border-orange-500 pr-2">🥤 المشروبات</h2>
                <div class="horizontal-scroll">
                    <div class="food-card !flex-none !w-40 border-orange-500/30">
                        <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=200" class="!h-20">
                        <h4 class="text-[10px] font-bold">غازيات (اختر النوع)</h4>
                        <select id="soda-type" class="w-full bg-black border border-white/20 text-[10px] rounded my-1 p-1">
                            <option value="بيبسي">بيبسي</option>
                            <option value="سفن اب">سفن اب</option>
                            <option value="حمضيات">حمضيات</option>
                            <option value="ديو">ديو</option>
                            <option value="شاني">شاني</option>
                        </select>
                        <p class="text-orange-500 font-black text-xs">2.5 ريال</p>
                        <button onclick="addSoda()" class="w-full bg-orange-600 text-black font-black py-1 rounded-lg text-[10px] mt-1">أضف</button>
                    </div>
                    <div class="food-card !flex-none !w-28">
                        <img src="https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=200" class="!h-20">
                        <h4 class="text-[10px] font-bold">ماء</h4>
                        <p class="text-orange-500 font-black text-xs my-1">1 ريال</p>
                        <button onclick="addToCart('ماء', 1)" class="w-full bg-orange-600 text-black font-black py-1 rounded-lg text-[10px]">أضف</button>
                    </div>
                </div>
            </div>`;
            container.innerHTML += drinkHtml;
        }

        function addSoda() { const type = document.getElementById('soda-type').value; addToCart(type, 2.5); }
        function addToCart(name, price) { cart.push({name, price}); updateUI(); document.getElementById('cart-panel').style.display = 'block'; }
        function updateUI() {
            const list = document.getElementById('cart-items'); list.innerHTML = ''; let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded-xl text-xs"><span>${item.name}</span><button onclick="cart.splice(${index},1);updateUI()" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
            });
            document.getElementById('total-price').innerText = total + ' ريال';
        }
        function checkout() {
            let msg = `📦 طلب جديد\n`;
            cart.forEach(i => msg += `• ${i.name}\n`);
            msg += `💰 الإجمالي: ${cart.reduce((s,i)=>s+i.price,0)} ريال`;
            window.open(`https://wa.me/966546656090?text=${encodeURIComponent(msg)}`);
        }
        function toggleSidebar() { const s = document.getElementById('sidebar'); const o = document.getElementById('overlay'); const open = s.style.right === '0px'; s.style.right = open ? '-300px' : '0px'; o.style.display = open ? 'none' : 'block'; }
        function sendSugg() { alert('تم استلام اقتراحك'); toggleSidebar(); }
        render();
    </script>
</body>
</html>
