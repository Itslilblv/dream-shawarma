<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - قائمة الطعام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; scroll-behavior: smooth; }
        
        .hero {
            height: 80vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(10,10,10,1)), 
                        url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=1200');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* نظام التمرير الأفقي الجديد */
        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* إخفاء الشريط في فايرفوكس */
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; } /* إخفاء الشريط في كروم وسفاري */

        .food-card {
            flex: 0 0 160px; /* عرض البطاقة */
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .food-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 10px;
        }

        .btn-main { background: #ea580c; color: white; padding: 15px 35px; border-radius: 50px; font-weight: 900; box-shadow: 0 8px 15px rgba(234, 88, 12, 0.3); }
        
        .tab-active { background-color: #f97316 !important; color: black !important; font-weight: 900; }
        
        .delivery-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px; margin-bottom: 10px; }
        .delivery-toggle button { flex: 1; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .toggle-active { background: #f97316; color: black; }
    </style>
</head>
<body>

    <nav class="absolute top-0 w-full z-50 p-6 flex justify-between items-center">
        <div class="w-10 h-10 bg-black/20 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10">
            <i class="fas fa-bars"></i>
        </div>
        <div class="text-center">
            <span class="text-xl font-black text-white italic tracking-tighter">DREAM SHAWARMA</span>
        </div>
        <div class="w-10 h-10 bg-black/20 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10">
            <i class="fas fa-shopping-bag"></i>
        </div>
    </nav>

    <header class="hero">
        <h2 class="text-orange-500 font-bold tracking-[4px] text-xs mb-2">PREMIUM QUALITY</h2>
        <h1 class="text-5xl font-black mb-6">Taste the <span class="text-orange-500">Dream</span></h1>
        <a href="#menu-start" class="btn-main">اطلب الآن</a>
    </header>

    <div id="menu-start" class="px-4 flex overflow-x-auto gap-2 mb-8 mt-[-30px] relative z-10 scrollbar-hide">
        <button onclick="setBranch('شارع 32', '966546656090', this)" class="branch-btn tab-active flex-shrink-0 bg-black/60 backdrop-blur-md px-6 py-3 rounded-2xl text-xs border border-white/10">فرع شارع 32</button>
        <button onclick="setBranch('حدا', '966560883385', this)" class="branch-btn flex-shrink-0 bg-black/60 backdrop-blur-md px-6 py-3 rounded-2xl text-xs border border-white/10">فرع حدا</button>
        <button onclick="setBranch('خط العين', '966549113072', this)" class="branch-btn flex-shrink-0 bg-black/60 backdrop-blur-md px-6 py-3 rounded-2xl text-xs border border-white/10">فرع خط العين</button>
        <button onclick="setBranch('المجاهدين', '966550147396', this)" class="branch-btn flex-shrink-0 bg-black/60 backdrop-blur-md px-6 py-3 rounded-2xl text-xs border border-white/10">فرع المجاهدين</button>
    </div>

    <main id="menu-root" class="max-w-xl mx-auto px-4 pb-40"></main>

    <div class="max-w-xl mx-auto px-4 mb-20 flex flex-col items-center gap-4">
        <div class="flex gap-4">
            <a href="https://www.instagram.com/_itlulp" target="_blank" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-pink-500"><i class="fab fa-instagram text-2xl"></i></a>
            <a href="https://www.tiktok.com/@shawarmadream25" target="_blank" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-white"><i class="fab fa-tiktok text-2xl"></i></a>
        </div>
    </div>

    <div id="cart-footer" class="fixed bottom-0 w-full bg-black/90 backdrop-blur-2xl border-t border-white/10 p-6 z-50 hidden rounded-t-[2.5rem] shadow-2xl">
        <div class="delivery-toggle">
            <button id="btn-takeaway" onclick="setOrderType('استلام')" class="toggle-active">📦 استلام</button>
            <button id="btn-delivery" onclick="setOrderType('توصيل')">🚗 توصيل</button>
        </div>
        <div id="cart-items" class="max-h-20 overflow-y-auto mb-4 space-y-2"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-between px-8 items-center">
            <span>تأكيد الطلب</span>
            <span id="total-price">0 ريال</span>
        </button>
    </div>

    <script>
        const branches = { 'شارع 32': '966546656090', 'حدا': '966560883385', 'خط العين': '966549113072', 'المجاهدين': '966550147396' };
        let activeBranch = 'شارع 32';
        let orderType = 'استلام';
        let cart = [];

        const menuData = {
            "🌯 الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما دجاج كبير", p:8, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي كبير", p:19, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي وسط", p:16, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}
            ],
            "🍱 قسم الوجبات": [
                {n:"وجبة برجر دجاج", p:15, img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=300"},
                {n:"وجبة برجر لحم", p:15, img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=300"},
                {n:"وجبة دبل برجر", p:20, img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=300"}
            ]
        };

        function setBranch(name, phone, btn) {
            activeBranch = name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('btn-takeaway').className = type === 'استلام' ? 'toggle-active' : '';
            document.getElementById('btn-delivery').className = type === 'توصيل' ? 'toggle-active' : '';
        }

        function render() {
            const root = document.getElementById('menu-root');
            root.innerHTML = '';
            for (const [cat, items] of Object.entries(menuData)) {
                let s = `<div class="mb-10">
                    <h2 class="text-orange-500 font-black mb-4 text-lg border-r-4 border-orange-500 pr-3">${cat}</h2>
                    <div class="horizontal-scroll">`;
                items.forEach(item => {
                    s += `<div class="food-card">
                        <img src="${item.img}">
                        <h4 class="text-[11px] font-bold mb-1 h-8 overflow-hidden">${item.n}</h4>
                        <p class="text-orange-500 font-black text-sm mb-3">${item.p} ريال</p>
                        <button onclick="add('${item.n}', ${item.p})" class="w-full bg-white/10 hover:bg-orange-600 py-2 rounded-xl text-[10px] font-bold transition">أضف للطلب</button>
                    </div>`;
                });
                root.innerHTML += s + `</div></div>`;
            }
        }

        function add(n, p) {
            cart.push({ n, p, id: Date.now() });
            updateUI();
        }

        function remove(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const f = document.getElementById('cart-footer');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            cart.length > 0 ? f.classList.remove('hidden') : f.classList.add('hidden');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.p;
                itemsDiv.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-[10px]">
                    <span>${i.n}</span>
                    <button onclick="remove(${i.id})" class="text-red-500">حذف</button>
                </div>`;
            });
            totalSpan.innerText = total + ' ريال';
        }

        function checkout() {
            let t = `طلب جديد - شاورما دريم 🌯\nالفرع: *${activeBranch}*\nالنوع: *${orderType}*\n\n`;
            cart.forEach(i => t += `• ${i.n} (${i.p} ريال)\n`);
            t += `\n*الإجمالي: ${cart.reduce((s, i) => s + i.p, 0)} ريال*`;
            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(t)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
