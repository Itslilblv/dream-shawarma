<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - المنيو الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #0d0d0d; 
            color: white; 
            overflow-x: hidden; 
            position: relative;
        }

        @keyframes floatUpDown {
            0% { transform: translate(0, 0); }
            50% { transform: translate(0, 25px); }
            100% { transform: translate(0, 0); }
        }

        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.12;
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="100" font-size="60" opacity="1">🌯</text></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="100" font-size="60" opacity="1">🍔</text></svg>');
            background-repeat: repeat;
            background-size: 90px;
            animation: floatUpDown 12s infinite ease-in-out;
        }

        .section-card { 
            background: rgba(25, 25, 25, 0.65) !important; 
            backdrop-blur: 12px; 
            border-radius: 2rem; 
            padding: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 2rem; 
            transition: all 0.4s ease; 
        }

        /* تكبير اللوجو */
        .main-logo {
            font-size: 2rem; /* تكبير الحجم */
            font-weight: 900;
            color: #f97316;
            font-style: italic;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
        }

        .tab-active { background-color: #f97316 !important; color: black !important; font-weight: 900; }
        
        .bubble-img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(249, 115, 22, 0.3);
            background-color: #1a1a1a;
        }
    </style>
</head>
<body class="pb-40">
    <div class="bg-pattern"></div>

    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md z-50 border-b border-white/5 p-5 flex justify-between items-center">
        <h1 class="main-logo">DREAM SHAWARMA</h1>
        <div id="branch-tag" class="bg-orange-500 text-black px-4 py-1.5 rounded-full text-xs font-black shadow-lg">فرع شارع 32</div>
    </nav>

    <div class="pt-32 px-4 flex flex-wrap justify-center gap-2 mb-8">
        <button onclick="setBranch('شارع 32', this)" class="branch-btn tab-active bg-white/5 px-5 py-2.5 rounded-xl text-xs md:text-sm transition-all">شارع 32</button>
        <button onclick="setBranch('حدا', this)" class="branch-btn bg-white/5 px-5 py-2.5 rounded-xl text-xs md:text-sm transition-all">حدا</button>
        <button onclick="setBranch('خط العين', this)" class="branch-btn bg-white/5 px-5 py-2.5 rounded-xl text-xs md:text-sm transition-all">خط العين</button>
        <button onclick="setBranch('المجاهدين', this)" class="branch-btn bg-white/5 px-5 py-2.5 rounded-xl text-xs md:text-sm transition-all">المجاهدين</button>
    </div>

    <main id="menu-root" class="max-w-2xl mx-auto px-4 space-y-6"></main>

    <footer class="text-center py-12 mt-10">
        <a href="https://instagram.com/_itlulp" target="_blank" class="text-4xl hover:text-pink-500 transition-colors">
            <i class="fa-brands fa-instagram"></i>
            <span class="block text-[10px] mt-1 font-black">@_itlulp</span>
        </a>
    </footer>

    <div id="cart-footer" class="fixed bottom-0 w-full bg-[#121212]/98 backdrop-blur-xl border-t border-white/10 p-5 z-50 hidden rounded-t-3xl shadow-2xl">
        <div id="cart-items" class="max-h-32 overflow-y-auto mb-4 space-y-2"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-between px-6 items-center hover:scale-[1.02] transition-transform">
            <span>إرسال الطلب عبر واتساب</span>
            <span id="total-price" class="bg-black/10 px-4 py-1 rounded-xl">0 ريال</span>
        </button>
    </div>

    <script>
        const branches = { 'شارع 32': '966549113072', 'حدا': '966546656090', 'خط العين': '966549113072', 'المجاهدين': '966549113072' };
        let activeBranch = 'شارع 32';
        let cart = [];

        // روابط صور جديدة ومباشرة
        const imgs = {
            sh: "https://images.pexels.com/photos/10350125/pexels-photo-10350125.jpeg?auto=compress&cs=tinysrgb&w=400", 
            bg: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?auto=compress&cs=tinysrgb&w=400",
            it: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?auto=compress&cs=tinysrgb&w=400",
            dr: "https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg?auto=compress&cs=tinysrgb&w=400",
            wa: "https://images.pexels.com/photos/1000084/pexels-photo-1000084.jpeg?auto=compress&cs=tinysrgb&w=400"
        };

        const menuData = {
            "🌯 قسم الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, i:imgs.sh}, {n:"شاورما دجاج كبير", p:8, i:imgs.sh}, {n:"شاورما صغير بالجبنة", p:7, i:imgs.sh}, {n:"شاورما كبير بالجبنة", p:9, i:imgs.sh},
                {n:"صحن عربي كبير", p:19, i:imgs.sh}, {n:"صحن عربي وسط", p:16, i:imgs.sh}, {n:"صحن عربي صغير", p:12, i:imgs.sh}, {n:"صحن بطاطس كبير", p:15, i:imgs.sh}
            ],
            "🍱 قسم الوجبات": [
                {n:"وجبة برجر دجاج", p:15, i:imgs.bg}, {n:"وجبة برجر لحم", p:15, i:imgs.bg}, {n:"وجبة دبل برجر", p:20, i:imgs.bg}, {n:"برجر زنجر", p:8, i:imgs.bg}
            ],
            "🥤 المشروبات": [
                {n:"ماء", p:1, i:imgs.wa}, {n:"بيبسي / مشروب", p:2.5, i:imgs.dr}, {n:"عصير مصاص", p:2, i:imgs.dr}
            ]
        };

        function setBranch(name, btn) {
            activeBranch = name;
            document.getElementById('branch-tag').innerText = 'فرع ' + name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function render() {
            const root = document.getElementById('menu-root');
            for (const [cat, items] of Object.entries(menuData)) {
                let s = `<div class="section-card"><h2 class="text-orange-500 font-black mb-6 text-xl border-r-4 border-orange-500 pr-4">${cat}</h2><div class="space-y-4">`;
                items.forEach(item => {
                    s += `<div class="flex items-center gap-4 bg-white/5 p-3 rounded-3xl border border-white/5">
                        <img src="${item.i}" class="bubble-img" onerror="this.src='https://via.placeholder.com/80?text=Food'">
                        <div class="flex-1">
                            <h4 class="text-xs md:text-sm font-bold">${item.n}</h4>
                            <span class="text-orange-500 font-black text-lg">${item.p} ريال</span>
                        </div>
                        <button onclick="add('${item.n}', ${item.p})" class="bg-orange-500 text-black px-5 py-2 rounded-2xl font-black text-xs">أضف</button>
                    </div>`;
                });
                root.innerHTML += s + `</div></div>`;
            }
        }

        function add(n, p) {
            cart.push({ n, p, id: Date.now() });
            updateUI();
        }

        function remove(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const f = document.getElementById('cart-footer');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            cart.length > 0 ? f.classList.remove('hidden') : f.classList.add('hidden');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.p;
                itemsDiv.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-xs">
                    <span>${i.n}</span>
                    <button onclick="remove(${i.id})" class="text-red-500 font-black">X</button>
                </div>`;
            });
            totalSpan.innerText = total + ' ريال';
        }

        function checkout() {
            // تنظيف النص من أي أكواد برمجية
            let text = `طلب جديد من شاورما دريم 🌯\n`;
            text += `الفرع: ${activeBranch}\n\n`;
            cart.forEach(i => text += `- ${i.n} (${i.p} ريال)\n`);
            const total = cart.reduce((s, i) => s + i.p, 0);
            text += `\nإجمالي الحساب: ${total} ريال`;
            
            // استخدام URL المخصص للواتساب بدون رموز كود
            const whatsappUrl = `https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(text)}`;
            window.open(whatsappUrl, '_blank');
        }

        render();
    </script>
</body>
</html>
