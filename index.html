<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - بحرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; }
        .orange-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-white/5 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-orange-500 italic">DREAM SHAWARMA</h1>
            <div id="branch-display" class="bg-orange-500 text-black px-3 py-1 rounded-lg text-sm font-bold">فرع شارع 32</div>
        </div>
    </nav>

    <section class="pt-40 pb-16 px-4 text-center">
        <h1 class="text-6xl font-black mb-4 orange-glow">شاورما <span class="text-orange-500">دريم</span></h1>
        <p class="text-gray-500 text-lg italic">أطعم شاورما وبرجر في بحرة</p>
        <div class="mt-8 flex justify-center gap-2 flex-wrap">
            <button onclick="setBranch('شارع 32', '966549113072')" class="bg-white/10 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-xl transition">فرع شارع 32</button>
            <button onclick="setBranch('الوحدة', '966546656090')" class="bg-white/10 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-xl transition">فرع الوحدة</button>
            <button onclick="setBranch('خط العين', '966549113072')" class="bg-white/10 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-xl transition">فرع خط العين</button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 pb-20 space-y-12">
        <div>
            <h2 class="text-2xl font-bold mb-6 text-orange-400 border-r-4 border-orange-400 pr-4">الشاورما</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-[#121212] p-4 rounded-3xl border border-white/5">
                    <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=800" class="rounded-2xl mb-4 h-48 w-full object-cover">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-lg font-bold">صاروخ دجاج</span>
                        <span class="text-orange-500 font-black">14 ريال</span>
                    </div>
                    <button onclick="order('صاروخ دجاج', '14 ريال')" class="w-full bg-[#25D366] text-black py-3 rounded-xl font-black transition active:scale-95">اطلب واتساب</button>
                </div>
                </div>
        </div>
    </main>

    <script>
        let currentBranch = 'شارع 32';
        let currentPhone = '966549113072';

        function setBranch(name, phone) {
            currentBranch = name;
            currentPhone = phone;
            document.getElementById('branch-display').innerText = 'فرع ' + name;
            alert('تم تحويل الطلبات إلى فرع: ' + name);
        }

        function order(item, price) {
            const msg = `مرحباً شاورما دريم 👋%0Aأود طلب: *${item}*%0Aالسعر: *${price}*%0Aالفرع: *${currentBranch}*`;
            window.open(`https://wa.me/${currentPhone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
