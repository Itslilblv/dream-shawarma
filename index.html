<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shawarma | شاورما دريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; }
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 0; scrollbar-width: none; }
        .food-card { flex: 0 0 160px; background: rgba(255, 255, 255, 0.03); border-radius: 1.5rem; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .food-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 1rem; }
        .cart-footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; border-radius: 2rem 2rem 0 0; border-t: 1px solid #333; z-index: 100; }
        .tab-active { background: #f97316 !important; color: black !important; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center">
        <div class="text-2xl font-black italic text-orange-500">DREAM</div>
        <div class="relative">
            <i class="fas fa-shopping-bag text-2xl text-gray-400"></i>
            <span id="badge" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 pb-48">
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="setBranch('شارع 32', this)" class="branch-btn tab-active bg-white/5 px-6 py-2 rounded-xl flex-shrink-0 text-sm">شارع 32</button>
            <button onclick="setBranch('حدا', this)" class="branch-btn bg-white/5 px-6 py-2 rounded-xl flex-shrink-0 text-sm">حدا</button>
            <button onclick="setBranch('خط العين', this)" class="branch-btn bg-white/5 px-6 py-2 rounded-xl flex-shrink-0 text-sm">خط العين</button>
            <button onclick="setBranch('المجاهدين', this)" class="branch-btn bg-white/5 px-6 py-2 rounded-xl flex-shrink-0 text-sm">المجاهدين</button>
        </div>

        <div id="menu-sections" class="mt-6"></div>
    </main>

    <div id="cart-footer" class="cart-footer hidden">
        <div class="flex justify-between items-center mb-4">
            <span class="text-gray-400">إجمالي الطلب</span>
            <span id="total-price" class="text-2xl font-black text-orange-500">0 ريال</span>
        </div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-xl text-lg flex items-center justify-center gap-2">
            <i class="fab fa-whatsapp"></i> إتمام الطلب الآن
        </button>
    </div>

    <script>
        const branches = { 'شارع 32': '966546656090', 'حدا': '966560883385', 'خط العين': '966549113072', 'المجاهدين': '966550147396' };
        let activeBranch = 'شارع 32';
        let cart = [];

        const menuData = {
            "🌯 الشاورما": [
                {n:"شاورما دجاج صغير", p:6, cat:"food"},
                {n:"شاورما دجاج كبير", p:8, cat:"food"},
                {n:"شاورما جبنة", p:7, cat:"food"}
            ],
            "🥤 المشروبات": [
                {n:"بيبسي", p:2.5, cat:"drink"},
                {n:"ماء", p:1, cat:"drink"}
            ]
        };

        function isHappyHour() {
            const now = new Date();
            const day = now.getDay(); 
            const hour = now.getHours();
            return (day === 0 || day === 1) && (hour >= 16 && hour < 19);
        }

        function setBranch(name, btn) {
            activeBranch = name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function render() {
            const happy = isHappyHour();
            const container = document.getElementById('menu-sections');
            container.innerHTML = '';
            
            for (const [cat, items] of Object.entries(menuData)) {
                let html = `<div class="mb-8"><h2 class="text-lg font-black mb-2">${cat}</h2><div class="horizontal-scroll">`;
                items.forEach(item => {
                    const price = (happy && item.cat === 'food') ? item.p - 2 : item.p;
                    html += `<div class="food-card">
                        <img src="https://via.placeholder.com/150/222/orange?text=DREAM">
                        <h4 class="text-[11px] font-bold mt-2">${item.n}</h4>
                        <p class="text-orange-500 font-black text-sm my-2">${price} ريال</p>
                        <button onclick="add('${item.n}', ${price})" class="w-full bg-white/10 py-2 rounded-lg text-[10px] font-bold">أضف</button>
                    </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            }
        }

        function add(n, p) {
            cart.push({n, p});
            updateUI();
        }

        function updateUI() {
            const f = document.getElementById('cart-footer');
            const badge = document.getElementById('badge');
            f.classList.toggle('hidden', cart.length === 0);
            badge.classList.toggle('hidden', cart.length === 0);
            badge.innerText = cart.length;
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.p, 0) + ' ريال';
        }

        function checkout() {
            const now = new Date();
            const time = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            const total = cart.reduce((s, i) => s + i.p, 0);
            
            // تجميع الأصناف المتشابهة
            const summary = {};
            cart.forEach(i => summary[i.n] = (summary[i.n] || 0) + 1);
            
            let itemsText = "";
            for (const [name, qty] of Object.entries(summary)) {
                itemsText += `• ${qty}x ${name}\n`;
            }

            let message = `📦 *طلب جديد - شاورما دريم*\n`;
            message += `--------------------------\n`;
            message += `📍 *الفرع:* ${activeBranch}\n`;
            message += `🕒 *الوقت:* ${time}\n`;
            message += `🍱 *نوع الطلب:* سفري (استلام)\n\n`;
            message += `📝 *الطلبات:*\n${itemsText}\n`;
            message += `--------------------------\n`;
            message += `💰 *إجمالي الحساب: ${total} ريال*\n`;
            message += `_شكراً لاختياركم شاورما دريم_ ✨`;

            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(message)}`);
        }

        render();
    </script>
</body>
</html>
