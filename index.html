<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - المنيو الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #0a0a0a; 
            color: white; 
            position: relative;
            overflow-x: hidden;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="50">🌯</text></svg>'), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" x="50" font-size="50">🍔</text></svg>');
            background-size: 120px 120px;
            animation: float 12s infinite ease-in-out;
        }

        .section-card { 
            background: rgba(18, 18, 18, 0.55); 
            backdrop-filter: blur(12px);
            border-radius: 1.5rem; 
            padding: 1.2rem; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 1.5rem; 
        }

        .tab-active { background-color: #f97316 !important; color: black !important; font-weight: 900; }
        .happy-banner { background: linear-gradient(90deg, #f97316, #ea580c); color: black; font-weight: 900; }
        
        .delivery-toggle {
            display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 10px;
        }
        .delivery-toggle button { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .toggle-active { background: #f97316; color: black; }
    </style>
</head>
<body class="pb-40">
    <div class="bg-pattern"></div>

    <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-white/10 p-4 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <img src="https://i.ibb.co/3W6s5L4/dream-shawarma-logo.png" alt="Logo" class="h-10 w-10 object-contain drop-shadow-lg">
            <h1 class="text-xl font-black text-orange-500 italic tracking-tighter">DREAM SHAWARMA</h1>
        </div>
        <div id="branch-tag" class="bg-orange-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black shadow-lg uppercase">فرع شارع 32</div>
    </nav>

    <div id="happy-banner" class="hidden mt-24 happy-banner py-2 text-center text-xs animate-pulse">
        🔥 عرض السعادة مفعّل الآن (خصم 2 ريال على الأصناف المختارة) 🔥
    </div>

    <div class="pt-28 px-4 flex flex-wrap justify-center gap-2 mb-6">
        <button onclick="setBranch('شارع 32', '966546656090', this)" class="branch-btn tab-active bg-white/5 px-4 py-2 rounded-xl text-[10px]">شارع 32</button>
        <button onclick="setBranch('حدا', '966560883385', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-[10px]">حدا</button>
        <button onclick="setBranch('خط العين', '966549113072', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-[10px]">خط العين</button>
        <button onclick="setBranch('المجاهدين', '966550147396', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-[10px]">المجاهدين</button>
    </div>

    <main id="menu-root" class="max-w-xl mx-auto px-4"></main>

    <div id="cart-footer" class="fixed bottom-0 w-full bg-[#121212]/95 backdrop-blur-2xl border-t border-white/10 p-4 z-50 hidden shadow-2xl rounded-t-[2.5rem]">
        
        <div class="delivery-toggle">
            <button id="btn-takeaway" onclick="setOrderType('استلام')" class="toggle-active">📦 استلام من الفرع</button>
            <button id="btn-delivery" onclick="setOrderType('توصيل')">🚗 توصيل للمنزل</button>
        </div>
        
        <div id="delivery-note" class="hidden text-[10px] text-orange-400 text-center mb-2 animate-bounce">
            ⚠️ يرجى إرسال موقعك (Location) بعد إرسال الطلب في الواتساب
        </div>

        <div id="cart-items" class="max-h-24 overflow-y-auto mb-3 space-y-2"></div>
        
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-between px-6 items-center shadow-lg active:scale-95 transition-transform duration-150">
            <span>إرسال الطلب عبر واتساب</span>
            <span id="total-price" class="bg-black/15 px-3 py-1 rounded-lg">0 ريال</span>
        </button>
    </div>

    <script>
        // الأرقام المحدثة حسب طلبك
        const branches = { 
            'شارع 32': '966546656090', 
            'حدا': '966560883385', 
            'خط العين': '966549113072', 
            'المجاهدين': '966550147396' 
        };
        let activeBranch = 'شارع 32';
        let orderType = 'استلام';
        let cart = [];

        const imgs = {
            sh: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=400",
            bg: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=400",
            it: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=400",
            dr: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=400",
            wa: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?q=80&w=400"
        };

        const menuData = {
            "🌯 قسم الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, i:imgs.sh}, {n:"شاورما دجاج كبير", p:8, i:imgs.sh}, {n:"شاورما صغير بالجبنة", p:7, i:imgs.sh}, {n:"شاورما كبير بالجبنة", p:9, i:imgs.sh},
                {n:"صحن عربي كبير", p:19, i:imgs.sh}, {n:"صحن عربي كبير بالجبنة", p:20, i:imgs.sh}, {n:"صحن عربي وسط", p:16, i:imgs.sh}, {n:"صحن عربي وسط بالجبنة", p:17, i:imgs.sh},
                {n:"صحن عربي صغير", p:12, i:imgs.sh}, {n:"صحن عربي صغير بالجبنة", p:13, i:imgs.sh}, {n:"صحن بطاطس صغير", p:5, i:imgs.sh}, {n:"صحن بطاطس وسط", p:7, i:imgs.sh},
                {n:"صحن بطاطس كبير", p:15, i:imgs.sh}, {n:"بطاطس كرسبي صغير", p:6, i:imgs.sh}, {n:"بطاطس كرسبي كبير", p:9, i:imgs.sh}
            ],
            "🍱 قسم الوجبات": [
                {n:"وجبة برجر دجاج", p:15, i:imgs.bg}, {n:"وجبة برجر دجاج بالجبنة", p:16, i:imgs.bg}, {n:"وجبة برجر دجاج حراق", p:15, i:imgs.bg}, {n:"وجبة برجر حراق بالجبنة", p:16, i:imgs.bg},
                {n:"وجبة برجر لحم", p:15, i:imgs.bg}, {n:"وجبة برجر لحم بالجبنة", p:16, i:imgs.bg}, {n:"وجبة برجر لحم حراق", p:15, i:imgs.bg}, {n:"وجبة برجر لحم حراق بالجبنة", p:16, i:imgs.bg},
                {n:"وجبة دبل برجر", p:20, i:imgs.bg}, {n:"وجبة دبل بالجبنة", p:21, i:imgs.bg}, {n:"برجر زنجر", p:8, i:imgs.bg}, {n:"برجر زنجر بالجبنة", p:9, i:imgs.bg}
            ],
            "🍔 ساندوتشات و إضافات": [
                {n:"برجر دجاج", p:8, i:imgs.bg}, {n:"برجر دجاج بالجبنة", p:9, i:imgs.bg}, {n:"برجر لحم", p:8, i:imgs.bg}, {n:"برجر لحم بالجبنة", p:9, i:imgs.bg},
                {n:"برجر دبل", p:15, i:imgs.bg}, {n:"برجر دبل بالجبنة", p:16, i:imgs.bg}, {n:"برجر سمك", p:8, i:imgs.bg}, {n:"برجر جمبري", p:8, i:imgs.bg},
                {n:"تورتيلا", p:9, i:imgs.bg}, {n:"باشكة ايطاليا", p:20, i:imgs.it}, {n:"إضافة جبنة", p:1, i:imgs.it}
            ],
            "🥤 المشروبات": [
                {n:"ماء", p:1, i:imgs.wa, noD:true}, {n:"بيبسي / حمضيات", p:2.5, i:imgs.dr, noD:true}, {n:"عصير مصاص", p:2, i:imgs.dr, noD:true}
            ]
        };

        function isHappy() {
            const d = new Date();
            return (d.getDay() === 0 || d.getDay() === 1) && (d.getHours() >= 17 && d.getHours() < 19);
        }

        function setBranch(name, phone, btn) {
            activeBranch = name;
            document.getElementById('branch-tag').innerText = 'فرع ' + name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('btn-takeaway').className = type === 'استلام' ? 'toggle-active' : '';
            document.getElementById('btn-delivery').className = type === 'توصيل' ? 'toggle-active' : '';
            document.getElementById('delivery-note').classList.toggle('hidden', type !== 'توصيل');
        }

        function render() {
            const root = document.getElementById('menu-root');
            root.innerHTML = '';
            const happy = isHappy();
            if(happy) document.getElementById('happy-banner').classList.remove('hidden');

            for (const [cat, items] of Object.entries(menuData)) {
                let s = `<div class="section-card"><h2 class="text-orange-500 font-black mb-4 border-r-4 border-orange-500 pr-3">${cat}</h2><div class="space-y-4">`;
                items.forEach(item => {
                    const price = (happy && !item.noD) ? item.p - 2 : item.p;
                    s += `<div class="flex items-center gap-4 bg-white/5 p-2 rounded-2xl border border-white/5">
                        <img src="${item.i}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold">${item.n}</h4>
                            <span class="text-orange-500 font-black text-sm">${price} ريال</span>
                        </div>
                        <button onclick="add('${item.n}', ${price})" class="bg-orange-500 text-black px-4 py-2 rounded-xl font-black text-xs active:scale-90 transition">أضف</button>
                    </div>`;
                });
                root.innerHTML += s + `</div></div>`;
            }
        }

        function add(n, p) {
            cart.push({ n, p, id: Date.now() });
            updateUI();
        }

        function remove(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const f = document.getElementById('cart-footer');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            cart.length > 0 ? f.classList.remove('hidden') : f.classList.add('hidden');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.p;
                itemsDiv.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-[10px]">
                    <span>${i.n}</span>
                    <button onclick="remove(${i.id})" class="text-red-500 font-black">X</button>
                </div>`;
            });
            totalSpan.innerText = total + ' ريال';
        }

        function checkout() {
            let t = `طلب جديد - شاورما دريم 🌯\n`;
            t += `الفرع: *${activeBranch}*\n`;
            t += `نوع الطلب: *${orderType}*\n\n`;
            cart.forEach(i => t += `• ${i.n} (${i.p} ريال)\n`);
            t += `\n*الإجمالي: ${cart.reduce((s, i) => s + i.p, 0)} ريال*`;
            if(orderType === 'توصيل') t += `\n\n📍 _بانتظار إرسال الموقع الخاص بك.._`;
            
            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(t)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
