<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - بحرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; scroll-behavior: smooth; }
        .orange-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="pb-10">
    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md z-50 border-b border-white/5 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-orange-500 tracking-tighter italic">DREAM SHAWARMA</h1>
            <div id="active-branch-name" class="bg-orange-500 text-black px-3 py-1 rounded-full text-[10px] md:text-sm font-black">فرع شارع 32</div>
        </div>
    </nav>

    <section class="pt-32 pb-12 px-4 text-center">
        <h1 class="text-5xl md:text-7xl font-black mb-4 orange-glow tracking-tight">شاورما <span class="text-orange-500">دريم</span></h1>
        <p class="text-gray-400 text-sm md:text-lg mb-8 italic">المذاق الأصلي في بحرة.. اختر فرعك واطلب الآن</p>
        
        <div class="flex flex-wrap justify-center gap-2 mb-10">
            <button onclick="changeBranch('شارع 32', '966549113072')" class="branch-btn bg-orange-500 text-black px-4 py-2 rounded-xl text-sm font-bold transition-all">فرع شارع 32</button>
            <button onclick="changeBranch('وحدة', '966546656090')" class="branch-btn bg-white/5 text-gray-400 px-4 py-2 rounded-xl text-sm font-bold hover:bg-white/10 transition-all">فرع وحدة</button>
            <button onclick="changeBranch('خط العين', '966549113072')" class="branch-btn bg-white/5 text-gray-400 px-4 py-2 rounded-xl text-sm font-bold hover:bg-white/10 transition-all">فرع خط العين</button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 space-y-16">
        
        <div id="shawarma">
            <h2 class="text-2xl font-black mb-6 text-orange-500 flex items-center gap-3">
                <span class="w-10 h-1 bg-orange-500 rounded-full"></span> الشاورما
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#121212] rounded-[2.5rem] p-4 border border-white/5 group card-shadow">
                    <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=800" class="w-full h-48 object-cover rounded-[2rem] mb-4">
                    <div class="flex justify-between items-center px-2 mb-4">
                        <h3 class="text-lg font-bold text-white">صاروخ دجاج</h3>
                        <span class="text-orange-500 font-black">14 ريال</span>
                    </div>
                    <button onclick="orderItem('صاروخ دجاج', '14 ريال')" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                        اطلب واتساب
                    </button>
                </div>
                <div class="bg-[#121212] rounded-[2.5rem] p-4 border border-white/5 group card-shadow">
                    <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=800" class="w-full h-48 object-cover rounded-[2rem] mb-4">
                    <div class="flex justify-between items-center px-2 mb-4">
                        <h3 class="text-lg font-bold text-white">صحن عربي تريبل</h3>
                        <span class="text-orange-500 font-black">29 ريال</span>
                    </div>
                    <button onclick="orderItem('صحن عربي تريبل', '29 ريال')" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                        اطلب واتساب
                    </button>
                </div>
            </div>
        </div>

        <div id="burger">
            <h2 class="text-2xl font-black mb-6 text-orange-500 flex items-center gap-3">
                <span class="w-10 h-1 bg-orange-500 rounded-full"></span> البرجر
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#121212] rounded-[2.5rem] p-4 border border-white/5 card-shadow">
                    <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=800" class="w-full h-48 object-cover rounded-[2rem] mb-4">
                    <div class="flex justify-between items-center px-2 mb-4">
                        <h3 class="text-lg font-bold text-white">وجبة برجر دجاج</h3>
                        <span class="text-orange-500 font-black">20 ريال</span>
                    </div>
                    <button onclick="orderItem('وجبة برجر دجاج', '20 ريال')" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                        اطلب واتساب
                    </button>
                </div>
                <div class="bg-[#121212] rounded-[2.5rem] p-4 border border-white/5 card-shadow">
                    <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=800" class="w-full h-48 object-cover rounded-[2rem] mb-4">
                    <div class="flex justify-between items-center px-2 mb-4">
                        <h3 class="text-lg font-bold text-white">وجبة برجر دبل</h3>
                        <span class="text-orange-500 font-black">27 ريال</span>
                    </div>
                    <button onclick="orderItem('وجبة برجر دبل', '27 ريال')" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                        اطلب واتساب
                    </button>
                </div>
            </div>
        </div>

        <div id="drinks">
            <h2 class="text-2xl font-black mb-6 text-orange-500 flex items-center gap-3">
                <span class="w-10 h-1 bg-orange-500 rounded-full"></span> المشروبات والمياه
            </h2>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-[#121212] p-4 rounded-3xl border border-white/5 flex flex-col items-center">
                    <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=800" class="w-20 h-20 object-cover rounded-full mb-3">
                    <h3 class="text-sm font-bold mb-1">بيبسي / مشروب</h3>
                    <span class="text-orange-500 font-black text-xs">3 ريال</span>
                    <button onclick="orderItem('مشروب غازي', '3 ريال')" class="mt-3 w-full bg-[#25D366]/20 text-[#25D366] py-2 rounded-xl text-xs font-black">اطلب</button>
                </div>
                <div class="bg-[#121212] p-4 rounded-3xl border border-white/5 flex flex-col items-center">
                    <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=800" class="w-20 h-20 object-cover rounded-full mb-3">
                    <h3 class="text-sm font-bold mb-1">مياه معدنية</h3>
                    <span class="text-orange-500 font-black text-xs">1 ريال</span>
                    <button onclick="orderItem('مياه معدنية', '1 ريال')" class="mt-3 w-full bg-[#25D366]/20 text-[#25D366] py-2 rounded-xl text-xs font-black">اطلب</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedBranch = { name: 'شارع 32', phone: '966549113072' };

        function changeBranch(name, phone) {
            selectedBranch = { name, phone };
            document.getElementById('active-branch-name').innerText = 'فرع ' + name;
            
            // تحديث ستايل الأزرار
            document.querySelectorAll('.branch-btn').forEach(btn => {
                if(btn.innerText.includes(name)) {
                    btn.classList.add('bg-orange-500', 'text-black');
                    btn.classList.remove('bg-white/5', 'text-gray-400');
                } else {
                    btn.classList.remove('bg-orange-500', 'text-black');
                    btn.classList.add('bg-white/5', 'text-gray-400');
                }
            });
        }

        function orderItem(item, price) {
            const message = `مرحباً شاورما دريم 👋%0Aأود طلب: *${item}*%0Aالسعر: *${price}*%0Aالفرع المختقم: *${selectedBranch.name}*`;
            const url = `https://wa.me/${selectedBranch.phone}?text=${message}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
