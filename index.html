<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - المنيو الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #0d0d0d; 
            color: white; 
            overflow-x: hidden; 
        }

        @keyframes floatUpDown {
            0% { transform: translate(0, 0); }
            50% { transform: translate(0, 20px); }
            100% { transform: translate(0, 0); }
        }

        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1; 
            opacity: 0.1; 
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="100" font-size="60" opacity="1">🌯</text></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="100" font-size="60" opacity="1">🍔</text></svg>');
            background-repeat: repeat;
            background-size: 80px; 
            animation: floatUpDown 15s infinite ease-in-out; 
        }

        .section-card { 
            background: rgba(20,20,20,0.7) !important; 
            backdrop-blur: 10px; 
            border-radius: 2rem; 
            padding: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.03); 
            margin-bottom: 2rem; 
            transition: all 0.4s ease; 
        }

        .tab-active { background-color: #f97316 !important; color: black !important; font-weight: 900; }
        
        .bubble-img {
            width: 80px;
            height: 80px;
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #f97316; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body class="pb-40">
    <div class="bg-pattern"></div>

    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md z-50 border-b border-white/5 p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <img src="https://api.dicebear.com/7.x/icons/svg?seed=Food&backgroundColor=f97316" alt="Logo" class="h-10 w-10 rounded-full">
            <h1 class="text-2xl font-black text-orange-500 italic tracking-tighter">DREAM SHAWARMA</h1>
        </div>
        <div id="branch-tag" class="bg-orange-500 text-black px-3 py-1 rounded-full text-xs font-black shadow-md">فرع شارع 32</div>
    </nav>

    <div class="pt-28 px-4 flex flex-wrap justify-center gap-2 mb-8 z-20">
        <button onclick="setBranch('شارع 32', '966549113072', this)" class="branch-btn tab-active bg-white/5 px-4 py-2 rounded-xl text-xs transition-all">شارع 32</button>
        <button onclick="setBranch('حدا', '966546656090', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-xs transition-all">حدا</button>
        <button onclick="setBranch('خط العين', '966549113072', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-xs transition-all">خط العين</button>
        <button onclick="setBranch('المجاهدين', '966549113072', this)" class="branch-btn bg-white/5 px-4 py-2 rounded-xl text-xs transition-all">المجاهدين</button>
    </div>

    <main id="menu-root" class="max-w-2xl mx-auto px-4 space-y-6"></main>

    <div id="cart-footer" class="fixed bottom-0 w-full bg-[#121212]/98 backdrop-blur-lg border-t border-white/10 p-4 z-50 hidden shadow-2xl rounded-t-3xl">
        <div id="cart-items" class="max-h-32 overflow-y-auto mb-3 space-y-2"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-between px-6 items-center shadow-lg active:scale-95">
            <span>إرسال الطلب عبر واتساب</span>
            <span id="total-price" class="bg-black/20 px-4 py-1.5 rounded-xl font-black">0 ريال</span>
        </button>
    </div>

    <script>
        const branches = { 'شارع 32': '966549113072', 'حدا': '966546656090', 'خط العين': '966549113072', 'المجاهدين': '966549113072' };
        let activeBranch = 'شارع 32';
        let cart = [];

        // روابط صور بديلة دائمة واحترافية
        const imgs = {
            sh: "https://images.pexels.com/photos/5638260/pexels-photo-5638260.jpeg?auto=compress&cs=tinysrgb&w=200", // شاورما
            bg: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?auto=compress&cs=tinysrgb&w=200", // برجر
            it: "https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?auto=compress&cs=tinysrgb&w=200", // باشكة
            dr: "https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg?auto=compress&cs=tinysrgb&w=200", // مشروبات
            wa: "https://images.pexels.com/photos/407041/pexels-photo-407041.jpeg?auto=compress&cs=tinysrgb&w=200"  // ماء
        };

        const menuData = {
            "🌯 قسم الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, i:imgs.sh}, {n:"شاورما دجاج كبير", p:8, i:imgs.sh},
                {n:"صحن عربي كبير", p:19, i:imgs.sh}, {n:"صحن بطاطس وسط", p:7, i:imgs.sh}
            ],
            "🍱 قسم الوجبات": [
                {n:"وجبة برجر دجاج", p:15, i:imgs.bg}, {n:"وجبة برجر لحم", p:15, i:imgs.bg}
            ],
            "🥤 المشروبات": [
                {n:"ماء", p:1, i:imgs.wa}, {n:"بيبسي / مشروب", p:2.5, i:imgs.dr}
            ]
        };

        function setBranch(name, phone, btn) {
            activeBranch = name;
            document.getElementById('branch-tag').innerText = 'فرع ' + name;
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function render() {
            const root = document.getElementById('menu-root');
            root.innerHTML = '';
            for (const [cat, items] of Object.entries(menuData)) {
                let s = `<div class="section-card"><h2 class="text-orange-500 font-black mb-6 text-xl border-r-4 border-orange-500 pr-4">${cat}</h2><div class="space-y-4">`;
                items.forEach(item => {
                    s += `<div class="flex items-center gap-4 bg-white/5 p-3 rounded-3xl border border-white/5">
                        <img src="${item.i}" class="bubble-img"> 
                        <div class="flex-1">
                            <h4 class="text-sm font-bold">${item.n}</h4>
                            <span class="text-orange-500 font-black text-lg">${item.p} ريال</span>
                        </div>
                        <button onclick="add('${item.n}', ${item.p})" class="bg-orange-500 text-black px-5 py-2 rounded-2xl font-black text-sm active:scale-90">أضف</button>
                    </div>`;
                });
                root.innerHTML += s + `</div></div>`;
            }
        }

        function add(n, p) {
            cart.push({ n, p, id: Date.now() });
            updateUI();
        }

        function remove(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const f = document.getElementById('cart-footer');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total-price');
            cart.length > 0 ? f.classList.remove('hidden') : f.classList.add('hidden');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.p;
                itemsDiv.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-xs">
                    <span>${i.n}</span>
                    <button onclick="remove(${i.id})" class="text-red-500 font-black">X</button>
                </div>`;
            });
            totalSpan.innerText = total + ' ريال';
        }

        function checkout() {
            let t = `طلب جديد من شاورما دريم 🌯\nالفرع: *${activeBranch}*\n\n`;
            cart.forEach(i => t += `• ${i.n} (${i.p} ريال)\n`);
            t += `\n*إجمالي الحساب: ${cart.reduce((s, i) => s + i.p, 0)} ريال*`;
            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(t)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
