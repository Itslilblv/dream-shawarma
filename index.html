<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shawarma | شاورما دريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .hero {
            height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #0a0a0a), 
                        url('https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=800'); /* صورة الواجهة الخلفية */
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative;
        }
        .hero-title { font-size: 3.2rem; font-weight: 900; line-height: 1; }
        .btn-order { background: #d35400; color: white; padding: 14px 45px; border-radius: 2rem; font-weight: 900; font-size: 1.3rem; margin-top: 2rem; box-shadow: 0 10px 30px rgba(211, 84, 0, 0.4); transition: 0.3s; }
        .btn-order:active { transform: scale(0.95); }
        .branch-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 20px; scrollbar-width: none; }
        .branch-scroll::-webkit-scrollbar { display: none; }
        .branch-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 1.2rem; white-space: nowrap; font-size: 14px; }
        .branch-active { background: #f97316; color: black; font-weight: bold; border-color: #f97316; }
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 5px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .food-card { flex: 0 0 165px; scroll-snap-align: start; background: rgba(255, 255, 255, 0.04); border-radius: 1.8rem; padding: 12px; border: 1px solid rgba(255,255,255,0.08); text-align: center; transition: 0.3s; }
        .food-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.08); }
        .food-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 1.2rem; margin-bottom: 8px; }
        #sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #0f0f0f; z-index: 500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px; border-left: 1px solid #222; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 400; display: none; backdrop-filter: blur(5px); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-active { display: flex; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-10">
            <span class="font-black text-orange-500 italic">DREAM MENU</span>
            <button onclick="toggleSidebar()"><i class="fas fa-times text-xl text-white/50 hover:text-white"></i></button>
        </div>
        <div class="space-y-6">
            <button onclick="showModal('customer-tab')" class="w-full text-right font-bold flex justify-between items-center transition hover:text-orange-500">
                <span>أرسل اقتراحك</span><i class="fas fa-pen-nib text-orange-500"></i>
            </button>
            <hr class="border-white/5">
            <button onclick="checkAdmin()" class="w-full text-right font-bold flex justify-between items-center opacity-30 hover:opacity-100">
                <span>الإدارة</span><span>🔒</span>
            </button>
        </div>
    </div>

    <section class="hero">
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center z-10">
            <button class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 transition active:scale-95"><i class="fas fa-shopping-bag"></i></button>
            <div class="font-black italic tracking-widest text-lg">SHAWARMA DREAM</div>
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 transition active:scale-95"><i class="fas fa-bars"></i></button>
        </nav>
        <div class="animate__animated animate__fadeInUp">
            <p class="text-orange-500 font-bold tracking-[4px] text-xs">PREMIUM QUALITY</p>
            <h1 class="hero-title">Taste the <br><span class="text-orange-500 italic">Dream</span></h1>
            <button onclick="document.getElementById('menu-start').scrollIntoView({behavior:'smooth'})" class="btn-order animate__animated animate__pulse animate__infinite animate__slow">اطلب الآن</button>
        </div>
    </section>

    <div id="menu-start" class="branch-scroll no-scrollbar pt-6">
        <button onclick="setBranch('شارع 32', this)" class="branch-btn branch-active flex-shrink-0">فرع شارع 32</button>
        <button onclick="setBranch('حدا', this)" class="branch-btn flex-shrink-0">فرع حدا</button>
        <button onclick="setBranch('خط العين', this)" class="branch-btn flex-shrink-0">فرع خط العين</button>
        <button onclick="setBranch('المجاهدين', this)" class="branch-btn flex-shrink-0">فرع المجاهدين</button>
    </div>

    <main id="menu-container" class="px-5 pb-48 pt-4"></main>

    <div id="cart-footer" class="fixed bottom-0 left-0 w-full bg-black/90 backdrop-blur-xl p-6 rounded-t-3xl border-t border-white/10 hidden animate__animated animate__slideInUp">
        <div class="flex justify-between items-center mb-4">
            <p class="font-black text-gray-400">إجمالي الطلب</p>
            <p id="total-price" class="text-2xl font-black text-orange-500">0 ريال</p>
        </div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-black font-black py-4 rounded-2xl flex justify-center items-center gap-2 transition active:scale-95">
            إتمام الطلب عبر واتساب <i class="fab fa-whatsapp text-lg"></i>
        </button>
    </div>

    <div id="customer-tab" class="modal">
        <div class="bg-[#121212] p-6 rounded-3xl w-full max-w-sm border border-white/10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-black">اقتراحك يهمنا ✨</h3>
                <button onclick="closeModal('customer-tab')"><i class="fas fa-times text-white/50"></i></button>
            </div>
            <input id="guest-name" type="text" placeholder="الاسم الكريم" class="w-full bg-white/5 p-4 rounded-xl mb-3 border border-white/10 outline-none">
            <textarea id="guest-msg" placeholder="اكتب رأيك أو اقتراحك هنا..." class="w-full bg-white/5 p-4 rounded-xl mb-4 h-28 border border-white/10 outline-none"></textarea>
            <div class="flex gap-2">
                <button onclick="saveSuggestion()" class="w-full bg-orange-600 text-black font-black py-3 rounded-xl transition active:scale-95">إرسال الاقتراح</button>
            </div>
        </div>
    </div>

    <script>
        const branches = { 'شارع 32': '966546656090', 'حدا': '966560883385', 'خط العين': '966549113072', 'المجاهدين': '966550147396' };
        let activeBranch = 'شارع 32';
        let cart = [];

        // المنيو الكامل بالصور الصحيحة والخاصة بكل صنف
        const fullMenu = {
            "🌯 الشاورما والصحون": [
                {n:"شاورما دجاج صغير", p:6, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}, /* صورة سندوتش شاورما صغير */
                {n:"شاورما دجاج كبير", p:8, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}, /* صورة سندوتش شاورما كبير */
                {n:"شاورما دجاج صغير جبنة", p:7, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"شاورما دجاج كبير جبنة", p:9, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي صغير", p:12, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}, /* صورة صحن عربي */
                {n:"صحن عربي وسط", p:16, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي كبير", p:19, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"},
                {n:"صحن عربي كبير جبنة", p:20, img:"https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300"}
            ],
            "🍔 وجبات البرجر": [
                {n:"وجبة برجر دجاج", p:15, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"}, /* صورة وجبة برجر */
                {n:"وجبة برجر دجاج جبنة", p:16, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"وجبة برجر لحم", p:15, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"وجبة برجر لحم جبنة", p:16, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"وجبة دبل برجر", p:20, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"}
            ],
            "🍔 الساندوتشات (برجر)": [
                {n:"برجر دجاج", p:8, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر دجاج جبنة", p:9, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر لحم", p:8, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر سمك", p:8, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر جمبري", p:9, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"},
                {n:"برجر زنجر", p:8, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"}, /* صورة برجر زنجر حراق */
                {n:"برجر زنجر جبنة", p:9, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"}
            ],
            "🍟 أصناف البطاطس": [
                {n:"صحن بطاطس صغير", p:5, img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300"}, /* صورة بطاطس أصابع */
                {n:"صحن بطاطس كبير", p:15, img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300"},
                {n:"بطاطس كرسبي صغير", p:6, img:"https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?w=300"}, /* صورة بطاطس كرسبي */
                {n:"بطاطس كرسبي كبير", p:9, img:"https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?w=300"}
            ],
            "🍕 الباشكا الإيطالية": [
                {n:"باشكا إيطاليا", p:20, img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"}, /* صورة باشكا (بيتزا سميكة) */
                {n:"تورتيلا", p:9, img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"}
            ],
            "🥤 المشروبات": [
                {n:"بيبسي / حمضيات", p:2.5, img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300"}, /* صورة بيبسي */
                {n:"ماء", p:1, img:"https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=300"}, /* صورة ماء */
                {n:"عصير مصاص", p:2, img:"https://images.unsplash.com/photo-1582293041079-7814c2f12063?w=300"} /* صورة عصير */
            ]
        };

        function render() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            for (const [section, items] of Object.entries(fullMenu)) {
                let sectionHtml = `<div class="mb-10"><h2 class="text-xl font-black mb-3 border-r-4 border-orange-500 pr-2">${section}</h2><div class="horizontal-scroll">`;
                items.forEach(item => {
                    sectionHtml += `<div class="food-card">
                        <img src="${item.img}">
                        <h4 class="text-[11px] font-bold mt-1 h-6">${item.n}</h4>
                        <p class="text-orange-500 font-black text-sm my-2">${item.p} ريال</p>
                        <button onclick="addToCart('${item.n}', ${item.p})" class="w-full bg-orange-600 text-black font-black py-2 rounded-xl text-[10px]">أضف</button>
                    </div>`;
                });
                root.innerHTML += sectionHtml + `</div></div>`;
            }
        }
        function addToCart(n, p) { cart.push({n, p}); updateCartUI(); }
        function updateCartUI() { document.getElementById('cart-footer').classList.toggle('hidden', cart.length === 0); document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.p, 0) + ' ريال'; }
        function toggleSidebar() { const s = document.getElementById('sidebar'); const o = document.getElementById('overlay'); const open = s.style.right === '0px'; s.style.right = open ? '-280px' : '0px'; o.style.display = open ? 'none' : 'block'; }
        function showModal(id) { document.getElementById(id).classList.add('modal-active'); toggleSidebar(); }
        function closeModal(id) { document.getElementById(id).classList.remove('modal-active'); }
        function setBranch(name, btn) { activeBranch = name; document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('branch-active')); btn.classList.add('branch-active'); }
        function checkout() {
            let t = `📦 *طلب جديد من الموقع*\n*الفرع:* ${activeBranch}\n*📝 الطلبات:*\n`;
            cart.forEach(i => t += `• ${i.n} (${i.p} ريال)\n`);
            t += `---\n*💰 الإجمالي: ${cart.reduce((s, i) => s + i.p, 0)} ريال*`;
            window.open(`https://wa.me/${branches[activeBranch]}?text=${encodeURIComponent(t)}`);
        }
        render();
    </script>
</body>
</html>
