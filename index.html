<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاورما دريم - الفروع الرسمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0a; color: white; scroll-behavior: smooth; }
        .happy-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); border: 2px solid #f97316 !important; }
        .section-card { background: #121212; border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; padding: 1.5rem; }
        .tab-active { background-color: #f97316 !important; color: black !important; font-weight: 900; }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md z-50 border-b border-white/5 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-orange-500 italic tracking-tighter">DREAM SHAWARMA</h1>
            <div id="active-branch-label" class="bg-orange-500/10 text-orange-500 border border-orange-500/20 px-3 py-1 rounded-lg text-[10px] font-black">جاري تحديد الفرع...</div>
        </div>
    </nav>

    <div id="happy-banner" class="hidden mt-20 bg-orange-600 text-black py-2 text-center font-black text-sm">
        🔥 مفعّل الآن: عرض السعادة (خصم 2 ريال على الأصناف المختارة) 🔥
    </div>

    <section class="pt-28 pb-6 px-4">
        <p class="text-center text-gray-500 text-xs mb-4 font-bold italic">اختر الفرع الأقرب إليك للطلب:</p>
        <div class="flex flex-wrap justify-center gap-2 max-w-2xl mx-auto">
            <button onclick="setBranch('شارع 32', '966549113072', this)" class="branch-tab bg-white/5 text-gray-400 px-4 py-2 rounded-xl text-xs transition-all tab-active">شارع 32</button>
            <button onclick="setBranch('حدا', '966546656090', this)" class="branch-tab bg-white/5 text-gray-400 px-4 py-2 rounded-xl text-xs transition-all">حدا</button>
            <button onclick="setBranch('خط العين', '966549113072', this)" class="branch-tab bg-white/5 text-gray-400 px-4 py-2 rounded-xl text-xs transition-all">خط العين</button>
            <button onclick="setBranch('المجاهدين', '966549113072', this)" class="branch-tab bg-white/5 text-gray-400 px-4 py-2 rounded-xl text-xs transition-all">المجاهدين</button>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 space-y-8">
        <div id="menu-container" class="space-y-8"></div>
    </main>

    <script>
        let currentBranch = { name: 'شارع 32', phone: '966549113072' };

        const menuData = {
            shawarma: [
                {n: "شاورما دجاج صغير", p: 6}, {n: "شاورما دجاج كبير", p: 8},
                {n: "شاورما دجاج صغير بالجبنة", p: 7}, {n: "شاورما دجاج كبير بالجبنة", p: 9},
                {n: "صحن عربي كبير", p: 19}, {n: "صحن عربي وسط", p: 16}, {n: "صحن عربي صغير", p: 12}
            ],
            meals: [
                {n: "وجبة برجر دجاج", p: 15}, {n: "وجبة برجر لحم", p: 15},
                {n: "وجبة دبل برجر", p: 20}, {n: "وجبة دبل بالجبنة", p: 21},
                {n: "برجر زنجر", p: 8}
            ],
            drinks: [
                {n: "بيبسي", p: 2.5, noDiscount: true},
                {n: "ماء", p: 1, noDiscount: true},
                {n: "عصير مصاص", p: 2, noDiscount: true}
            ]
        };

        function isHappyHour() {
            const h = new Date().getHours();
            return (h >= 17 && h < 19);
        }

        function setBranch(name, phone, btn) {
            currentBranch = { name, phone };
            document.getElementById('active-branch-label').innerText = 'تطلب من: فرع ' + name;
            
            document.querySelectorAll('.branch-tab').forEach(t => t.classList.remove('tab-active'));
            btn.classList.add('tab-active');
        }

        function renderMenu() {
            const isHappy = isHappyHour();
            const container = document.getElementById('menu-container');
            const banner = document.getElementById('happy-banner');
            container.innerHTML = '';
            
            if(isHappy) banner.classList.remove('hidden');

            for (const [cat, items] of Object.entries(menuData)) {
                let html = `<div class="section-card ${isHappy && cat !== 'drinks' ? 'happy-glow' : ''}">
                    <h2 class="text-orange-500 font-black mb-4 text-lg">${cat==='shawarma'?'🌯 شاورما':cat==='meals'?'🍱 وجبات':'🥤 مشروبات'}</h2>
                    <div class="grid gap-2">`;

                items.forEach(item => {
                    const price = (isHappy && !item.noDiscount) ? (item.p - 2) : item.p;
                    html += `
                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10">
                            <span class="text-sm">${item.n}</span>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-orange-500 text-sm">${price} ريال</span>
                                <button onclick="sendOrder('${item.n}', '${price}')" class="bg-[#25D366] text-black px-3 py-1.5 rounded-lg font-black text-[10px]">اطلب</button>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function sendOrder(name, price) {
            const msg = `مرحباً شاورما دريم 👋%0Aأود طلب: *${name}*%0Aالسعر: *${price} ريال*%0Aالفرع: *${currentBranch.name}*`;
            window.open(`https://wa.me/${currentBranch.phone}?text=${msg}`, '_blank');
        }

        // تشغيل أولي
        document.getElementById('active-branch-label').innerText = 'تطلب من: فرع ' + currentBranch.name;
        renderMenu();
    </script>
</body>
</html>
